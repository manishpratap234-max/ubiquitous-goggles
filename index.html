<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Endless Runner HTML Prototype</title>
  <style>
    :root { --bg:#081024; --panel:#111a33; --text:#ecf3ff; --accent:#50f0ff; --danger:#ff5a74; --coin:#ffd447; }
    * { box-sizing:border-box; font-family:Inter,system-ui,sans-serif; }
    body { margin:0; background:radial-gradient(circle at 50% 10%, #13203f, var(--bg)); color:var(--text); min-height:100vh; display:grid; place-items:center; }
    .app { width:min(460px, 100vw); height:min(860px, 100vh); border:1px solid #26365f; border-radius:16px; overflow:hidden; position:relative; background:#050b1a; }
    .screen { position:absolute; inset:0; display:none; padding:24px; }
    .screen.active { display:grid; }
    #splash, #menu, #gameover { place-content:center; text-align:center; gap:12px; }
    #game { grid-template-rows:auto 1fr; padding:0; }
    h1,h2,p { margin:0; }
    .btn { border:0; padding:12px 16px; border-radius:10px; font-weight:700; cursor:pointer; background:var(--accent); color:#041018; }
    .btn.secondary { background:#2c3d6b; color:var(--text); }
    .hud { display:flex; gap:8px; padding:10px; background:rgba(10,16,31,.9); border-bottom:1px solid #203058; align-items:center; }
    .pill { background:#1b2950; border:1px solid #2d437b; border-radius:999px; padding:6px 10px; font-size:13px; }
    .grow { flex:1; }
    canvas { width:100%; height:100%; display:block; }
    #pausePanel { position:absolute; inset:56px 0 0 0; display:none; background:rgba(4,7,14,.65); place-content:center; text-align:center; gap:10px; }
    #pausePanel.active { display:grid; }
    .small { font-size:12px; opacity:.85; }
  </style>
</head>
<body>
  <div class="app">
    <section id="splash" class="screen active">
      <h1>🏃 Endless Runner</h1>
      <p>Subway-style HTML prototype with swipe controls.</p>
      <button class="btn" id="toMenu">Continue</button>
    </section>

    <section id="menu" class="screen">
      <h2>Main Menu</h2>
      <p>Swipe ← → to change lane, ↑ jump, ↓ slide, double tap = hoverboard shield.</p>
      <button class="btn" id="startBtn">Start Run</button>
    </section>

    <section id="game" class="screen">
      <div class="hud">
        <div class="pill" id="score">Score: 0</div>
        <div class="pill" id="coins">Coins: 0</div>
        <div class="pill" id="mult">x1</div>
        <div class="grow"></div>
        <button class="btn secondary" id="pauseBtn">Pause</button>
      </div>
      <canvas id="canvas" width="460" height="800"></canvas>
      <div id="pausePanel">
        <h2>Paused</h2>
        <button class="btn" id="resumeBtn">Resume</button>
      </div>
    </section>

    <section id="gameover" class="screen">
      <h2>Game Over</h2>
      <p id="finalScore"></p>
      <p id="finalCoins"></p>
      <button class="btn" id="restartBtn">Restart</button>
      <button class="btn secondary" id="homeBtn">Home</button>
    </section>
  </div>

<script>
const screens = ['splash','menu','game','gameover'];
const show = (id) => screens.forEach(s => document.getElementById(s).classList.toggle('active', s===id));

const c = document.getElementById('canvas'), ctx = c.getContext('2d');
const W = c.width, H = c.height;
const laneX = [W*0.3, W*0.5, W*0.7];
let g;

function resetGame() {
  g = {
    running:true, paused:false, lane:1, y:0, vy:0, sliding:false, slideT:0,
    speed:8, time:0, distance:0, score:0, coins:0, mult:1,
    invincibleT:0, hoverCooldown:0,
    obstacles:[], coinsArr:[], powers:[], trains:[],
    spawnT:0
  };
}

function spawnRow() {
  const z = H + 80;
  const lane = Math.floor(Math.random()*3);
  const r = Math.random();
  if (r < 0.45) g.obstacles.push({lane,z,w:36,h:42});
  else if (r < 0.62) g.trains.push({lane,z,w:52,h:60,speed: g.speed + 4});
  else if (r < 0.86) g.coinsArr.push({lane,z,r:10});
  else {
    const types = ['magnet','jetpack','superjump','x2'];
    g.powers.push({lane,z,t:types[Math.floor(Math.random()*types.length)]});
  }
}

function applyPower(p) {
  if (p.t==='jetpack') g.invincibleT = Math.max(g.invincibleT, 5);
  if (p.t==='x2') { g.mult = 2; setTimeout(()=>{ if(g.running) g.mult = 1; }, 6000); }
  if (p.t==='superjump') g.vy = Math.max(g.vy, 16);
  if (p.t==='magnet') {
    const end = performance.now() + 5000;
    const loop = () => {
      if (!g.running || performance.now()>end) return;
      g.coinsArr.forEach(co => { if (Math.abs(co.lane-g.lane)<=1) co.lane = g.lane; });
      requestAnimationFrame(loop);
    }; loop();
  }
}

function collide(item, playerBox) {
  const x = laneX[item.lane], y = item.z;
  return Math.abs(x-playerBox.x) < (playerBox.w/2 + (item.w||item.r||16)/2)
    && Math.abs(y-playerBox.y) < (playerBox.h/2 + (item.h||item.r||16)/2);
}

function update(dt) {
  if (!g.running || g.paused) return;
  g.time += dt; g.distance += g.speed*dt; g.speed = Math.min(20, g.speed + dt*0.15);
  g.score = Math.floor((g.distance + g.coins*8) * g.mult);
  g.invincibleT = Math.max(0, g.invincibleT - dt);
  g.hoverCooldown = Math.max(0, g.hoverCooldown - dt);

  g.vy -= 30*dt; g.y += g.vy;
  if (g.y < 0) { g.y = 0; g.vy = 0; }
  if (g.slideT > 0) { g.slideT -= dt; if (g.slideT<=0) g.sliding = false; }

  g.spawnT -= dt;
  if (g.spawnT <= 0) { spawnRow(); g.spawnT = 0.45 + Math.random()*0.35; }

  const move = arr => arr.forEach(o=>o.z -= g.speed*8*dt);
  move(g.obstacles); move(g.coinsArr); move(g.powers); g.trains.forEach(t=>t.z -= t.speed*7*dt);

  const p = {x: laneX[g.lane], y:120-g.y*3, w:36, h:g.sliding?20:44};

  g.coinsArr = g.coinsArr.filter(co => {
    if (co.z < -30) return false;
    if (collide({lane:co.lane,z:co.z,r:co.r}, p)) { g.coins++; return false; }
    return true;
  });

  g.powers = g.powers.filter(po => {
    if (po.z < -30) return false;
    if (collide({lane:po.lane,z:po.z,w:20,h:20}, p)) { applyPower(po); return false; }
    return true;
  });

  const hit = [...g.obstacles, ...g.trains].some(ob => ob.z>-20 && collide(ob, p));
  if (hit && g.invincibleT <= 0) endGame();

  g.obstacles = g.obstacles.filter(o=>o.z>-40);
  g.trains = g.trains.filter(t=>t.z>-60);

  score.textContent = `Score: ${g.score}`;
  coins.textContent = `Coins: ${g.coins}`;
  mult.textContent = `x${g.mult}`;
}

function draw() {
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle = '#0c1631'; ctx.fillRect(0,0,W,H);

  // lanes perspective
  for(let i=0;i<3;i++){
    ctx.strokeStyle = '#2b477f'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(laneX[i], H); ctx.lineTo(laneX[i], 0); ctx.stroke();
  }

  const drawEntity = (lane,z,w,h,color,shape='rect') => {
    const x=laneX[lane], y=z;
    ctx.fillStyle=color;
    if(shape==='coin'){ ctx.beginPath(); ctx.arc(x,y,10,0,Math.PI*2); ctx.fill(); return; }
    ctx.fillRect(x-w/2,y-h/2,w,h);
  };

  g.obstacles.forEach(o=>drawEntity(o.lane,o.z,o.w,o.h,'#ff5a74'));
  g.trains.forEach(t=>drawEntity(t.lane,t.z,t.w,t.h,'#90a4ff'));
  g.coinsArr.forEach(co=>drawEntity(co.lane,co.z,20,20,'#ffd447','coin'));
  g.powers.forEach(p=>drawEntity(p.lane,p.z,18,18,'#50f0ff'));

  const py = 120-g.y*3;
  drawEntity(g.lane, py, 36, g.sliding?20:44, g.invincibleT>0 ? '#77ff9a' : '#ffffff');

  if (g.invincibleT>0){
    ctx.strokeStyle = '#77ff9a'; ctx.lineWidth = 2; ctx.strokeRect(laneX[g.lane]-24, py-30, 48, 60);
  }
}

let last = 0;
function loop(ts){
  const dt = Math.min(0.033, (ts-last)/1000 || 0.016); last = ts;
  update(dt); draw(); requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

function endGame(){
  g.running = false;
  finalScore.textContent = `Score: ${g.score}`;
  finalCoins.textContent = `Coins: ${g.coins}`;
  show('gameover');
}

function lane(delta){ g.lane = Math.max(0, Math.min(2, g.lane+delta)); }
function jump(){ if(g.y===0) g.vy = 12; }
function slide(){ if(g.y===0){ g.sliding=true; g.slideT=0.8; } }
function hoverboard(){ if(g.hoverCooldown<=0){ g.invincibleT=5; g.hoverCooldown=10; } }

let start = null, startT = 0, lastTap = 0;
function inputStart(x,y){ start={x,y}; startT=performance.now(); }
function inputEnd(x,y){
  if(!start) return;
  const dx = x-start.x, dy = y-start.y, adx=Math.abs(dx), ady=Math.abs(dy), t=performance.now()-startT;
  if(adx<25 && ady<25 && t<220){
    const now=performance.now(); if(now-lastTap<280) hoverboard(); lastTap=now; start=null; return;
  }
  if(adx>ady){ dx>0 ? lane(1) : lane(-1); }
  else { dy<0 ? jump() : slide(); }
  start=null;
}

c.addEventListener('touchstart', e=>inputStart(e.touches[0].clientX,e.touches[0].clientY), {passive:true});
c.addEventListener('touchend', e=>inputEnd(e.changedTouches[0].clientX,e.changedTouches[0].clientY));
c.addEventListener('mousedown', e=>inputStart(e.clientX,e.clientY));
c.addEventListener('mouseup', e=>inputEnd(e.clientX,e.clientY));

// UI
const score = document.getElementById('score');
const coins = document.getElementById('coins');
const mult = document.getElementById('mult');

document.getElementById('toMenu').onclick = () => show('menu');
document.getElementById('startBtn').onclick = () => { resetGame(); show('game'); };
document.getElementById('restartBtn').onclick = () => { resetGame(); show('game'); };
document.getElementById('homeBtn').onclick = () => show('menu');
document.getElementById('pauseBtn').onclick = () => { g.paused = true; pausePanel.classList.add('active'); };
document.getElementById('resumeBtn').onclick = () => { g.paused = false; pausePanel.classList.remove('active'); };

resetGame();
</script>
</body>
</html>
